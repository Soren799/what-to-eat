<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍽️ 今天吃什么？</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🍽️ 今天吃什么？</h1>
      <p class="subtitle">根据心情和状态，推荐最适合你的那一餐</p>
    </header>
    <main>
      <div class="selectors">
        <div class="selector-card">
          <label>😊 你现在的心情</label>
          <div class="options" id="mood-options"></div>
        </div>
        <div class="selector-card">
          <label>⏰ 你现在的状态</label>
          <div class="options" id="state-options"></div>
        </div>
        <div class="selector-card">
          <label>🍳 哪一餐？</label>
          <div class="options" id="meal-options"></div>
        </div>
      </div>
      <button id="recommend-btn" disabled>
        <span id="btn-text">👆 请选择心情、状态和餐别</span>
      </button>
      <div id="result" class="hidden">
        <div class="result-card">
          <div class="result-emoji" id="result-emoji">🍽️</div>
          <h2 id="result-title">推荐菜品</h2>
          <p id="result-desc"></p>
          <div class="result-tags" id="result-tags"></div>
        </div>
        <button id="reshuffle-btn" class="secondary-btn">🔄 换一个推荐</button>
      </div>
      <div class="random-section">
        <p class="random-hint">🤔 选择困难？</p>
        <button id="random-btn" class="ghost-btn">🎲 完全随机推荐</button>
      </div>
    </main>
    <footer><p>✨ 吃好每一餐，生活不简单</p></footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
